context:
  version: "0.6.14"

package:
  name: otpod
  version: ${{ version }}

source:
  url: https://github.com/openturns/otpod/archive/v${{ version }}.tar.gz
  sha256: 133e039e33473e9f6760e8eadc8186b82bd703b0d4f2cd7ac6cb84ab7693d000

build:
  number: 0
  noarch: python
  script: pip install . --no-deps -vv

requirements:
  host:
    - pip
    - setuptools
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - openturns >=1.27
    - matplotlib-base >=1.5
    - scikit-learn >=0.17
    - statsmodels >=0.6
    - decorator >=4.0

tests:
  - python:
      imports:
        - otpod
      python_version: ${{ python_min }}.*

about:
  homepage: http://openturns.org/
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file: COPYING.LESSER
  summary: A module to build Probability of Detection for Non Destructive Testing
  documentation: https://openturns.github.io/otpod/master/
  repository: https://github.com/openturns/otpod
  
extra:
  recipe-maintainers:
    - adumasphi
    - jschueller
